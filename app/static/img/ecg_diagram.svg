<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Style -->
  <style>
    .line { fill: none; stroke: #0d6efd; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .label { font-family: sans-serif; font-weight: bold; fill: #20c997; font-size: 16px; }
    .grid { stroke: #e9ecef; stroke-width: 1; }
  </style>
  
  <!-- Grid -->
  <defs>
    <pattern id="smallGrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#f8f9fa" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#smallGrid)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#e9ecef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- ECG Trace -->
  <!-- 
    Baseline: y=100
    P wave: small bump
    PR segment: flat
    QRS: dip, high spike, dip
    ST segment: flat
    T wave: medium bump
  -->
  <path class="line" d="
    M 10,100 
    L 50,100 
    Q 70,70 90,100  <!-- P Wave -->
    L 110,100 
    L 120,110  <!-- Q -->
    L 135,20   <!-- R -->
    L 150,120  <!-- S -->
    L 160,100 
    L 200,100 
    Q 230,60 260,100 <!-- T Wave -->
    L 300,100
    L 350,100
  " />

  <!-- Labels -->
  <text x="75" y="60" class="label">P</text>
  <text x="115" y="130" class="label">Q</text>
  <text x="130" y="15" class="label">R</text>
  <text x="155" y="140" class="label">S</text>
  <text x="240" y="50" class="label">T</text>

</svg>

{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 72vh;">
  <div class="col-md-7 col-lg-6">
    <div class="glass-card p-5 text-center">
      <h2 class="mb-3">Doctor Portal</h2>
      <p class="text-muted-custom mb-4">Continue with doctor login or create a new doctor account.</p>
      <div class="d-grid gap-3">
        <a href="{{ url_for('auth.doctor_login') }}" class="btn btn-modern-primary">Doctor Login</a>
        <a href="{{ url_for('auth.doctor_register') }}" class="btn btn-outline-light">Doctor Register</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
